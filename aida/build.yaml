build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base-debian:bookworm
  amd64: ghcr.io/home-assistant/amd64-base-debian:bookworm

# Pin the Claude Code CLI version.
# NOTE: Claude Code 2.1.9x+ (through at least 2.1.206) spins at 100% CPU on
# startup in this container and never returns — even `claude --version` hangs,
# regardless of libc, memory, or config. Live bisect showed everything up to
# 2.1.86 works and >= ~2.1.144 is broken, so we pin the newest known-good build.
# Re-test newer releases before bumping this.
args:
  CLAUDE_CODE_VERSION: "2.1.86"

labels:
  org.opencontainers.image.title: "Home Assistant Add-on: Aida"
  org.opencontainers.image.description: "Agentic AI assistant for Home Assistant, powered by Claude Code"
  org.opencontainers.image.source: "https://github.com/g4youu/homeassistant-aida"
  org.opencontainers.image.licenses: "MIT"
