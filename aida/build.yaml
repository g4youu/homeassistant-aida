build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base-debian:bookworm
  amd64: ghcr.io/home-assistant/amd64-base-debian:bookworm

# Claude Code CLI version bundled into the image. Kept at "latest" for the
# majority of users on modern CPUs. On CPUs without x86-64-v2 (older / default
# VM CPU models), recent Claude builds spin at 100% CPU on startup, so run.sh
# detects that at boot and transparently falls back to a compatible build —
# see the `claude_version` option and setup_claude_runtime() in run.sh.
args:
  CLAUDE_CODE_VERSION: "latest"

labels:
  org.opencontainers.image.title: "Home Assistant Add-on: Aida"
  org.opencontainers.image.description: "Agentic AI assistant for Home Assistant, powered by Claude Code"
  org.opencontainers.image.source: "https://github.com/g4youu/homeassistant-aida"
  org.opencontainers.image.licenses: "MIT"
