# Aida tmux configuration

set-option -g default-terminal $TERM
set-option -g base-index 1
setw -g pane-base-index 1

set -g status-style "fg=colour252,bg=#16161e"
set -g status-interval 15
set -g status-left "#[fg=colour167,bold] Aida #[fg=colour245]| "
set -g status-left-length 20
set -g status-right-length 60
set -g status-right "#(/opt/aida/scripts/tmux-status.sh)"

set -g window-status-current-style "fg=colour167,bold"
set -g window-status-style "fg=colour245"
set -g pane-active-border-style "fg=colour167"
set -g message-style "fg=colour167,bg=#16161e"

set -g update-environment "SUPERVISOR_TOKEN ANTHROPIC_CONFIG_DIR AIDA_MODE AIDA_AUTH_METHOD HOME"

if-shell '[ -z "$TTYD" ]' { set -g mouse on }

set -g set-clipboard on
set -g allow-passthrough on
set -g history-limit 50000
set -sg escape-time 0
setw -g mode-keys vi
