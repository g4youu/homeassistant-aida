name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: aida/Dockerfile
          config: .hadolint.yaml

      - name: ShellCheck scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -s bash -S error aida/run.sh aida/scripts/*.sh

      - name: Validate add-on config
        run: |
          python3 - <<'PY'
          import sys, yaml
          for f in ("aida/config.yaml", "aida/build.yaml"):
              with open(f) as fh:
                  yaml.safe_load(fh)
              print("ok:", f)
          cfg = yaml.safe_load(open("aida/config.yaml"))
          for key in ("name", "version", "slug", "arch"):
              assert key in cfg, f"missing required key: {key}"
          print("config.yaml has required keys")
          PY

      - name: Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        continue-on-error: true
        with:
          path: "./aida"

  build:
    name: Build (amd64 smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./aida
          file: ./aida/Dockerfile
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.21
          push: false
          tags: local/aida:ci
